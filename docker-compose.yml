services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-3}
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.rule=Host(`${FQDN_TRAEFIK:-traefik.test}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.service=api@internal"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.tls=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro

  privatebin:
    image: privatebin/nginx-fpm-alpine
    read_only: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-privatebin.rule=Host(`${FQDN_PRIVATEBIN:-privatebin.test}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-privatebin.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-privatebin.tls=true"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-privatebin.loadbalancer.server.port=8080"
    volumes:
      - privatebin-data:/srv/data

volumes:
  privatebin-data:
